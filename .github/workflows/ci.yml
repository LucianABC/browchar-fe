name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Al declarar permissions se pierden los defaults: packages:read es
# imprescindible para que npm resuelva @tpklabs/browchar-contracts
# (acceso otorgado al repo vía Manage Actions access del package).
permissions:
  contents: read
  packages: read

# Un push nuevo a la misma rama cancela la corrida anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # .npmrc referencia ${GITHUB_TOKEN}: sin la variable definida, cualquier
      # comando npm falla con "Failed to replace env in config".
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Aviso de drift contra GitHub Packages. Warning-only a propósito: un
      # publish nuevo de contracts no debe poner en rojo PRs del FE cuyo diff
      # no tiene nada que ver (mismo criterio por el que no hay npm audit
      # como gate). El chequeo bloqueante equivalente vive en el publish de
      # browchar-api (publish-contracts.yml).
      - name: Check contracts version freshness (warning only)
        run: |
          LATEST=$(npm view @tpklabs/browchar-contracts version 2>/dev/null) || {
            echo "::warning::No se pudo consultar la última versión de @tpklabs/browchar-contracts en GitHub Packages — chequeo de frescura salteado."
            exit 0
          }
          INSTALLED=$(node -p "require('./node_modules/@tpklabs/browchar-contracts/package.json').version")
          PIN=$(node -p "require('./package.json').dependencies['@tpklabs/browchar-contracts']")
          if [ "$INSTALLED" = "$LATEST" ]; then
            echo "@tpklabs/browchar-contracts $INSTALLED instalado = última publicada."
          elif npx --yes semver --range "$PIN" "$LATEST" > /dev/null; then
            echo "::warning::@tpklabs/browchar-contracts instalado en $INSTALLED pero la última publicada es $LATEST y el pin $PIN la admite — falta un npm update @tpklabs/browchar-contracts (+ lockfile)."
          else
            echo "::warning::Drift duro de @tpklabs/browchar-contracts: el pin $PIN NO admite la última publicada $LATEST (instalado: $INSTALLED). Bumpear el pin en package.json y regenerar el lockfile."
          fi

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
