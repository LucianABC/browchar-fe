name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # .npmrc referencia ${GITHUB_TOKEN}: sin la variable definida, cualquier
      # comando npm falla con "Failed to replace env in config". El token del
      # propio workflow alcanza para leer @tpklabs/browchar-contracts de
      # GitHub Packages (mismo owner, TPKLabs).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
